# Alacritty terminal emulator configuration
#
# Windows:
#   $APPDATA/alacritty/alacritty.toml

[general]
live_config_reload = true

[terminal]
shell = { program = "C:/Users/corey.goldberg/Scoop/apps/git/current/bin/bash.exe", args = ["--login"] }

[window]
dimensions = { columns = 170, lines = 46 }
padding = { x = 8, y = 4 }
position = { x = 0, y = 0 }

[font]
size = 14

[font.normal]
family = "UbuntuMono Nerd Font"
style = "Regular"

[font.bold]
family = "UbuntuMono Nerd Font"
style = "Bold"

[font.italic]
family = "UbuntuMono Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Block", blinking = "Always" }
blink_interval = 500
blink_timeout = 0

[keyboard]
bindings = [
    { key = "V", mods = "Control", action = "Paste" },
]
